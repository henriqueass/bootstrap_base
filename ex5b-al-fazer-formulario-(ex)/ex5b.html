<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>


<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{
    font-family: Arial, sans-serif;
    background:#ececec;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}


.login-box{
    background:white;
    padding:40px;
    border-radius:12px;
    width:420px;
}


.input-group{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:20px;
}


.input-group i{
    font-size:22px;
}


input{
    flex:1;
    padding:14px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
}


button{
    width:100%;
    padding:16px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#8e44ad;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#7d3c98;
}

</style>
</head>
<body>

<div class="login-box">

<form>

<div class="input-group">
<i class="bi bi-envelope"></i>
<input type="email" placeholder="Email">
</div>

<div class="input-group">
<i class="bi bi-lock"></i>
<input type="password" placeholder="Senha">
</div>

<button type="submit">
<i class="bi bi-arrow-right"></i> Entrar
</button>

</form>

</div>

</body>
</html>
